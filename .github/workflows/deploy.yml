name: Deploy Frontend to Azure Container Apps

# Trigger the deployment strictly when pushing code to the azuredeploy branch
on:
  push:
    branches:
      - azuredeploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull down your repository code onto the GitHub runner
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Log directly into your private Azure Container Registry 
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: beesocial.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # 3. Build your React Docker image and tag it cleanly
      - name: Build and Push Docker Image
        run: |
          docker build -t beesocial.azurecr.io/beesocial-frontend:latest .
          docker push beesocial.azurecr.io/beesocial-frontend:latest

      # 4. Authenticate directly with Azure using CLI credentials to update the container app
      - name: Log in to Azure CLI
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      # 5. Tell Azure Container Apps to deploy your fresh image
      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name beesocial-frontend \
            --resource-group DGW-RG-BS \
            --image beesocial.azurecr.io/beesocial-frontend:latest