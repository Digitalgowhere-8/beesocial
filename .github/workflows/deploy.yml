name: Deploy MERN Stack to Azure Container Apps

on:
  push:
    branches:
      - azuredeploy

permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # FRONTEND BUILD AND DEPLOY
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: beesocial.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Write .env.production so Vite bakes the correct backend URL at build time.
      # VITE_API_BASE_URL must match what axios.js reads (VITE_API_BASE_URL).
      - name: Create Production Environment File
        run: |
          echo "VITE_API_BASE_URL=https://beesocial-backend.wonderfulmoss-11cf811e.centralindia.azurecontainerapps.io" > ./frontend/.env.production

      - name: Build and Push Frontend Image
        run: |
          docker build \
            -t beesocial.azurecr.io/beesocial-frontend:latest ./frontend
          docker push beesocial.azurecr.io/beesocial-frontend:latest

      - name: Log in to Azure CLI via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Azure Container App Frontend
        run: |
          az containerapp update \
            --name beesocial-frontend \
            --resource-group DGW-RG-BS \
            --image beesocial.azurecr.io/beesocial-frontend:latest

  # ==========================================
  # BACKEND BUILD AND DEPLOY
  # ==========================================
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: beesocial.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -t beesocial.azurecr.io/beesocial-backend:latest ./backend
          docker push beesocial.azurecr.io/beesocial-backend:latest

      - name: Log in to Azure CLI via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Set all backend env vars here so they are authoritative (not just in ACR metadata).
      # CORS_ORIGINS ensures the backend whitelist includes the real frontend FQDN.
      - name: Update Azure Container App Backend
        run: |
          az containerapp update \
            --name beesocial-backend \
            --resource-group DGW-RG-BS \
            --image beesocial.azurecr.io/beesocial-backend:latest \
            --set-env-vars \
              PORT=5000 \
              MONGO_URI="${{ secrets.MONGO_URI }}" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              NODE_ENV=production \
              CORS_ORIGINS="https://beesocial-frontend.wonderfulmoss-11cf811e.centralindia.azurecontainerapps.io"
