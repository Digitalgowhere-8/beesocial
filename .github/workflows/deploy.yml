name: Deploy Frontend to Azure Container Apps

on:
  push:
    branches:
      - azuredeploy

# REQUIRED for passwordless OIDC login
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Log in to ACR (Keep using your Registry username/password secrets)
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: beesocial.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t beesocial.azurecr.io/beesocial-frontend:latest .
          docker push beesocial.azurecr.io/beesocial-frontend:latest

      # 2. Updated Passwordless Login (No Client Secrets required!)
      - name: Log in to Azure CLI via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}         # Save the Managed Identity Client ID here
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}         # Save your Directory Tenant ID here
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }} # Your Subscription ID

      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name beesocial-frontend \
            --resource-group DGW-RG-BS \
            --image beesocial.azurecr.io/beesocial-frontend:latest