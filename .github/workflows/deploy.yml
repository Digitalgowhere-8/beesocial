name: Deploy MERN Stack to Azure Container Apps

on:
  push:
    branches:
      - azuredeploy

permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # FRONTEND BUILD AND DEPLOY
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Log into Docker Hub to avoid rate limits and connection drops
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: beesocial.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Frontend Image
        run: |
          docker build -t beesocial.azurecr.io/beesocial-frontend:latest ./frontend
          docker push beesocial.azurecr.io/beesocial-frontend:latest

      - name: Log in to Azure CLI via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Azure Container App Frontend
        run: |
          az containerapp update \
            --name beesocial-frontend \
            --resource-group DGW-RG-BS \
            --image beesocial.azurecr.io/beesocial-frontend:latest

  # ==========================================
  # BACKEND BUILD AND DEPLOY
  # ==========================================
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: beesocial.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -t beesocial.azurecr.io/beesocial-backend:latest ./backend
          docker push beesocial.azurecr.io/beesocial-backend:latest

      - name: Log in to Azure CLI via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Azure Container App Backend
        run: |
          az containerapp update \
            --name beesocial-backend \
            --resource-group DGW-RG-BS \
            --image beesocial.azurecr.io/beesocial-backend:latest