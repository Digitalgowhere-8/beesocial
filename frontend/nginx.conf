server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip for faster loads
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Cache static assets aggressively; never cache the HTML entry point
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every unknown path returns index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for Azure Container Apps probe (optional but useful)
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
