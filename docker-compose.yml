version: '3.8'

services:
  # --- FRONTEND (React) ---
  frontend:
    image: node:20-alpine
    container_name: mern-frontend
    working_dir: /app
    volumes:
      - C:/Alok/Desktop/DGW/beesocial-main/frontend:/app
      - /app/node_modules 
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true 
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

  # --- BACKEND (Express) ---
  backend:
    image: node:20-alpine
    container_name: mern-backend
    working_dir: /app
    volumes:
      - C:/Alok/Desktop/DGW/beesocial-main/backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://info_db_user:info_db_pass@ac-fofhuqx-shard-00-00.ecbqhyw.mongodb.net:27017,ac-fofhuqx-shard-00-01.ecbqhyw.mongodb.net:27017,ac-fofhuqx-shard-00-02.ecbqhyw.mongodb.net:27017/?ssl=true&replicaSet=atlas-7c6f1w-shard-0&authSource=admin&appName=Cluster0
      - JWT_SECRET=replace_me_with_a_long_random_string_at_least_64_chars
    command: sh -c "npm install && npm run dev"